{% extends "base.html" %}

{% block title %}Register | Food Calorie Counter{% endblock %}

{% block content %}
<section class="auth-card">
  <div>
    <p class="eyebrow">Create Account</p>
    <h2>Start tracking</h2>
    <p class="muted">Create your account and set your daily calorie goal.</p>
  </div>
  <form method="post" class="form-card">
    <label>Username</label>
    <input type="text" name="username" placeholder="Choose username" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Create password" required>

    <label>Confirm Password</label>
    <input type="password" name="confirm_password" placeholder="Re-enter password" required>

    <label>Daily Calorie Goal</label>
    <input type="number" name="daily_goal" min="1" value="2000" required>

    <button type="submit" class="btn btn-primary">Register</button>
    <p class="form-hint muted">Already have an account? <a class="text-link" href="{{ url_for('login') }}">Sign in</a></p>
  </form>
</section>
{% endblock %}
